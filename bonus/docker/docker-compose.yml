# Optional observability stack for Lab 25: Prometheus + Grafana + a GPU cost exporter.
# Usage:  docker compose up   (then Grafana at http://localhost:3000, admin/admin)
services:
  exporter:
    image: python:3.12-slim
    working_dir: /app
    command: python exporter.py
    environment:
      LAB_DATA_DIR: /data
      PORT: "9101"
    volumes:
      - ./exporter.py:/app/exporter.py:ro
      - ../../data:/data:ro
    ports: ["9101:9101"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [exporter]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
